name: vanmitra_ai
description: VanMitra-AI — Gram Sabha Transparency & Forest Rights Platform for ओझर (Ozhar) village.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Local Storage (offline-first primary store)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase (cloud replica + auth)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  cloud_functions: ^5.0.0

  # Path provider (required directly by audio_capture_service)
  path_provider: ^2.1.4

  # Secure storage for auth tokens
  flutter_secure_storage: ^10.3.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Cryptography (SHA-256 hash chain)
  crypto: ^3.0.3

  # Charts
  fl_chart: ^0.66.0

  # Internationalization
  intl: ^0.20.2

  # UUID generation
  uuid: ^4.3.0

  # UI
  shimmer: ^3.0.0

  # HTTP (kept for AI module calls)
  http: ^1.2.0

  # Connectivity (offline-first fallback detection + sync trigger)
  connectivity_plus: ^6.1.1

  # Image/File picking + compression (compress → base64 → Firestore subdoc)
  image_picker: ^1.1.0
  flutter_image_compress: ^2.3.0

  # Progress indicators (evidence score gauge)
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.2
  google_fonts: any

  # ── Module C: Face Recognition ─────────────────────────────────────────────
  # ML Kit: face detection + bounding box (on-device, no API key)
  google_mlkit_face_detection: ^0.13.2
  # TFLite runtime: runs bundled facenet.tflite for 128-dim face embeddings
  tflite_flutter: ^0.12.1
  # Image processing: crop + resize face to 160×160 for FaceNet input
  image: ^4.1.7

  # ── Module C: Camera (live face detection during attendance) ───────────────
  camera: ^0.10.6

  # ── Module C: Speech-to-Text (device-native, Hindi/Marathi offline) ────────
  speech_to_text: ^7.4.0

  # ── Module C: Audio Recording (consent audio + STT input) ─────────────────
  record: ^6.2.1

  # ── Module C: On-Device Translation (EN/HI/MR, auto-downloads models once) ─
  google_mlkit_translation: ^0.13.1

  # ── Module C: PDF Generation (MoM PDF with Devanagari font) ───────────────
  pdf: ^3.10.8
  printing: ^5.12.0

  # ── Module C: Geolocator (meeting GPS stamp + geotag) ─────────────────────
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700

  assets:
    - assets/ai_config/evidence_weights.json
    - assets/ai_config/rejection_classes.json
    - assets/ai_config/form_titles.json
    - assets/ai_config/eligibility_rules.json
    - assets/images/samples/
    # Module C: FaceNet TFLite model (generated by convert_facenet.py)
    - assets/ml/facenet.tflite
